#######################################
# WINDOW SPLITTING & WINDOW SELECTION #
#######################################
# Create new window in current working directory
map alt+enter 			          new_window_with_cwd
map ctrl+t 				            new_tab_with_cwd
# Move between windows
map alt+p 				            next_window
map alt+o 				            previous_window
map ctrl+d 				            close_window

# hide_window_decorations titlebar-only
hide_window_decorations       yes
draw_minimal_borders          yes

####################
#     TAB BAR      #
####################
tab_bar_edge			            bottom
tab_bar_margin_width	        1.0
tab_bar_margin_height	        1.0 1.0
tab_bar_align			            left
tab_bar_style			            powerline
tab_fade                      0.25 0.5 0.75 1
tab_title_template            "{index}: {title[title.rfind('/')+1:]}"

####################
#      FONTS       #
####################
font_family				          ComicShannsMono Nerd Font
# font_family				          BlexMono Nerd Font
# font_family				          AnonymicePro Nerd Font
# font_family				          Lilex Nerd Font
bold_font				              auto
italic_font			              auto
bold_italic_font		          auto
font_size			                13
modify_font cell_height	      120%
# dynamic_background_opacity    yes
# background_opacity            0.9
# background_blur               1

####################
#       BELL       #
####################
enable_audio_bell		          no


# BEGIN_KITTY_THEME
# Treehouse
include current-theme.conf
# END_KITTY_THEME
